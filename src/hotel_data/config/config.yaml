# config.yaml - COMPLETE CONFIGURATION FILE

storage:
  minio_endpoint: "http://minio:9000"
  minio_access_key: "minioadmin"
  minio_secret_key: "minioadmin"
  minio_bucket: "hotel-data"
  delta_path: "s3a://hotel-data/delta"

scoring:
  weights:
    geo_distance_km: 0.15
    normalized_name_score_sbert: 0.20
    name_score_jaccard_lcs: 0.20
    star_ratings_score: 0.05
    address_sbert_score: 0.15
    phone_match_score: 0.10
    postal_code_match: 0.05
    country_match: 0.05
    email_match_score: 0.05
  
  thresholds:
    geo_distance_km: 0.5
    name_score_jaccard_lcs: 0.80
    normalized_name_score_jaccard_lcs: 0.50
    name_score_sbert: 0.50
    normalized_name_score_sbert: 0.50
    star_ratings_score: 0.10
    address_line1_score: 0.50
    postal_code_match: 0.90
    country_match: 0.90
    address_sbert_score: 0.50
    phone_match_score: 0.50
    email_match_score: 0.50
    fax_match_score: 0.50
    high_confidence: 0.85
    medium_confidence: 0.70
    low_confidence: 0.55

  comparators:
      geo_distance_km: lte
      name_score_jaccard_lcs: gte
      normalized_name_score_jaccard_lcs: gte
      name_score_sbert: gte
      normalized_name_score_sbert: gte
      star_ratings_score: gte
      address_line1_score: gte
      postal_code_match: gte
      country_match: gte
      address_sbert_score: gte
      phone_match_score: gte
      email_match_score: gte
      fax_match_score: gte
  
  exclusion_rules:
    max_geo_distance_km: 5.0
    min_country_match: 1.0
    min_normalized_name_score: 0.3

conflict_detection:
  enabled: true
  confidence_threshold: 0.70
  conflict_tolerance: 0.15
  max_chain_length: 3
  resolution_strategy: "remove_weakest"  # Options: remove_weakest, remove_all, adjust_confidence, break_chain
  
  # Detection flags
  detect_transitive: true
  detect_chains: true
  
  # Reporting
  report_details: true
  save_conflicts: true

clustering:
  # PRE Existing (unchanged)
  min_score_threshold: 0.50
  max_cluster_size: null
  # Existing (unchanged)
  score_threshold: 0.50
  confidence_threshold: 2
  min_cluster_size: 1
  
  # NEW: Black hole detection
  enable_black_hole_prevention: true
    # Default: true (enable detection)
    # Set to false to disable BH detection
    
  black_hole_max_threshold: 0.95
    # Default: 0.95 (very high similarity)
    # Pairs with score >= 0.95 flagged as potential black holes
    # Increase to 0.98 for more strict BH detection
    # Decrease to 0.90 for more lenient
    
  black_hole_min_size: 2
    # Default: 2 (pair appears in 1-2 matches)
    # Hotels appearing in <=2 pairs considered isolated
    # Increase to 3 or 4 for more aggressive isolation

streaming:
  enabled: false
  checkpoint_path: "s3a://hotel-data/checkpoints"
  trigger_interval: "5 minutes"
  max_batch_size: 10000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output_file: null

delta_lake:
  catalog_name: spark_catalog
  schema_name: bronze
  base_path: s3a://delta-bucket/hotel_data/delta

