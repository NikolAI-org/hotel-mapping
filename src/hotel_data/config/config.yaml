# config.yaml - COMPLETE CONFIGURATION FILE

storage:
  minio_endpoint: "http://minio:9000"
  minio_access_key: "minioadmin"
  minio_secret_key: "minioadmin"
  minio_bucket: "hotel-data"
  delta_path: "s3a://hotel-data/delta"

scoring:
  match_logic:
    operator: AND
    rules:
      # 1: Simple Leaf (Unary context)
      - signal: geo_distance_km
        threshold: 0.5
        comparator: lte
      - operator: OR
        rules:
          - signal: name_score_jaccard
            threshold: 0.9
            comparator: gte
          - signal: name_score_lcs
            threshold: 0.9
            comparator: gte
          - signal: name_score_levenshtein
            threshold: 0.9
            comparator: gte
          - signal: name_score_sbert
            threshold: 0.9
            comparator: gte
          - operator: AND
            rules:
              - signal: name_score_jaccard
                threshold: 0.75
                comparator: gte
              - signal: normalized_name_score_jaccard
                threshold: 0.9
                comparator: gte
          - operator: AND
            rules:
              - signal: name_score_lcs
                threshold: 0.75
                comparator: gte
              - signal: normalized_name_score_lcs
                threshold: 0.9
                comparator: gte
          - operator: AND
            rules:
              - signal: name_score_levenshtein
                threshold: 0.75
                comparator: gte
              - signal: normalized_name_score_levenshtein
                threshold: 0.9
                comparator: gte
          - operator: AND
            rules:
              - signal: name_score_sbert
                threshold: 0.75
                comparator: gte
              - signal: normalized_name_score_sbert
                threshold: 0.9
                comparator: gte
      - operator: OR
        rules:
          - signal: address_line1_score
            threshold: 0.2
            comparator: gte
          - signal: address_sbert_score
            threshold: 0.2
            comparator: gte
      - signal: star_ratings_score
        threshold: 0.0
        comparator: gte
      - operator: OR
        rules:
          - signal: postal_code_match
            threshold: 0.5
            comparator: gte
          - signal: geo_distance_km
            threshold: 0.1
            comparator: lte
      - signal: country_match
        threshold: 0.5
        comparator: gte
      - operator: OR
        rules:
          - signal: phone_match_score
            threshold: 0.5
            comparator: gte
          - signal: email_match_score
            threshold: 0.5
            comparator: gte
          - signal: fax_match_score
            threshold: 0.5
            comparator: gte

clustering:
  algorithm: clique
  # Options could be labelpropagation, unionfind, clique
  transitivity: True

streaming:
  enabled: false
  checkpoint_path: "s3a://hotel-data/checkpoints"
  trigger_interval: "5 minutes"
  max_batch_size: 10000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output_file: null

delta_lake:
  catalog_name: spark_catalog
  schema_name: bronze
  base_path: s3a://delta-bucket/hotel_data/delta

