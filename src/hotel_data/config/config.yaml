# config.yaml - COMPLETE CONFIGURATION FILE

storage:
  minio_endpoint: "http://minio:9000"
  minio_access_key: "minioadmin"
  minio_secret_key: "minioadmin"
  minio_bucket: "hotel-data"
  delta_path: "s3a://hotel-data/delta"

scoring:  
  thresholds:
    geo_distance_km: 0.5
    name_score_jaccard_lcs: 0.18
    normalized_name_score_jaccard_lcs: 0.18
    name_score_sbert: 0.0
    normalized_name_score_sbert: 0.0
    star_ratings_score: 0.7
    address_line1_score: 0.4
    postal_code_match: 0.6
    country_match: 0.90
    address_sbert_score: 0.0
    phone_match_score: 0.008
    email_match_score: 0.00004
    fax_match_score: 0.0

  # Values can be lte, gte, gt, lt
  comparators:
      geo_distance_km: lte
      name_score_jaccard_lcs: gte
      normalized_name_score_jaccard_lcs: gte
      name_score_sbert: gte
      normalized_name_score_sbert: gte
      star_ratings_score: gte
      address_line1_score: gte
      postal_code_match: gte
      country_match: gte
      address_sbert_score: gte
      phone_match_score: gte
      email_match_score: gte
      fax_match_score: gte


clustering:
  algorithm: unionfind
  # Options could be labelpropagation, leiden, unionfind

streaming:
  enabled: false
  checkpoint_path: "s3a://hotel-data/checkpoints"
  trigger_interval: "5 minutes"
  max_batch_size: 10000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output_file: null

delta_lake:
  catalog_name: spark_catalog
  schema_name: bronze
  base_path: s3a://delta-bucket/hotel_data/delta

