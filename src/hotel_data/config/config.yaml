# config.yaml - COMPLETE CONFIGURATION FILE

storage:
  minio_endpoint: "http://minio:9000"
  minio_access_key: "minioadmin"
  minio_secret_key: "minioadmin"
  minio_bucket: "hotel-data"
  delta_path: "s3a://hotel-data/delta"

scoring: 
  # Values can be lte, gte, gt, lt
  condition_groups:
    - operator: AND
      conditions:
        geo_distance_km:
          threshold: 0.8
          comparator: gte
    - operator: OR
      conditions:
        name_score_jaccard_lcs: 
          threshold: 0.18
          comparator: gte
        normalized_name_score_jaccard_lcs:
          threshold: 0.18
          comparator: gte
        name_score_sbert:
          threshold: 0.8
          comparator: gte
        normalized_name_score_sbert:
          threshold: 0.8
          comparator: gte
    - operator: OR
      conditions:
        address_line1_score: 
          threshold: 0.50
          comparator: gte
        address_sbert_score:
          threshold: 0.7
          comparator: gte
    - operator: OR
      conditions:
        star_ratings_score: 
          threshold: 0.50
          comparator: gte
        postal_code_match:
          threshold: 0.9
          comparator: gte
        country_match:
          threshold: 0.9
          comparator: gte
        phone_match_score:
          threshold: 0.6
          comparator: gte
        email_match_score:
          threshold: 0.6
          comparator: gte
        fax_match_score:
          threshold: 0.6
          comparator: gte
  group_operator: AND

clustering:
  algorithm: unionfind
  # Options could be labelpropagation, unionfind

streaming:
  enabled: false
  checkpoint_path: "s3a://hotel-data/checkpoints"
  trigger_interval: "5 minutes"
  max_batch_size: 10000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output_file: null

delta_lake:
  catalog_name: spark_catalog
  schema_name: bronze
  base_path: s3a://delta-bucket/hotel_data/delta

