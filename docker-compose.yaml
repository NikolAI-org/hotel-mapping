x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      JAVA_HOME_PATH: ${JAVA_HOME_PATH:-/usr/lib/jvm/java-17-openjdk-amd64}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    # MinIO/S3 Configuration
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    # Spark Configuration
    SPARK_HOME: /opt/spark
    JAVA_HOME: ${JAVA_HOME_PATH:-/usr/lib/jvm/java-17-openjdk-amd64}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/spark:/opt/airflow/spark
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/data
    - ${AIRFLOW_PROJ_DIR:-.}/spark/jars:/opt/spark-jars
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # PostgreSQL Database for Airflow
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - delta-lake-network

  # Redis for Celery broker
  redis:
    image: redis:7.2-alpine
    expose:
      - 6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - delta-lake-network

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - delta-lake-network

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - delta-lake-network

  # Airflow Worker
  airflow-worker:
    <<: *airflow-common
    command: bash -c "pip install celery==5.3.6 && celery -A airflow.providers.celery.executors.celery_executor.app worker --hostname=airflow-worker@%h -l info"
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    hostname: airflow-worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
      AIRFLOW__CELERY__WORKER_NAME: "airflow-worker"
    ports:
      - "4040:4040"
    restart: always
    volumes:
      - spark-binaries:/opt/spark
      - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
      - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
      - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
      - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
      - ${AIRFLOW_PROJ_DIR:-.}/spark:/opt/airflow/spark
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/data
      - ${AIRFLOW_PROJ_DIR:-.}/spark/jars:/opt/spark-jars
      - ${AIRFLOW_PROJ_DIR:-.}/src/hotel_data:/opt/airflow/hotel_data
      - hf-model-cache:/tmp/hf_cache
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - delta-lake-network

  # Airflow Triggerer
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - delta-lake-network

  # Airflow Initialization
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you should probably set AIRFLOW_UID=50000:0"
          echo
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources
    networks:
      - delta-lake-network

  # Airflow CLI
  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    networks:
      - delta-lake-network

  # Flower for Celery monitoring
  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:5555/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - delta-lake-network

  # Spark Master
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYSPARK_PYTHON=/usr/local/bin/python3
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python3
      - PYTHONPATH=/opt/airflow
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - spark-binaries:/opt/spark
      - ${AIRFLOW_PROJ_DIR:-.}/spark/conf:/opt/spark/conf
      - ${AIRFLOW_PROJ_DIR:-.}/spark/jobs:/opt/spark-jobs
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/data
      - ${AIRFLOW_PROJ_DIR:-.}/src/hotel_data:/opt/airflow/hotel_data
    networks:
      - delta-lake-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Spark Worker
  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_NO_DAEMONIZE=true
      # ROLLBACK: SPARK_WORKER_MEMORY=8G
      - SPARK_WORKER_MEMORY=22G
      # ROLLBACK: SPARK_WORKER_CORES=6
      - SPARK_WORKER_CORES=8
      - SPARK_WORKER_DIR=/tmp/spark-work
      - PYSPARK_PYTHON=/usr/local/bin/python3
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python3
      - PYTHONPATH=/opt/airflow
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/spark/conf:/opt/spark/conf
      - ${AIRFLOW_PROJ_DIR:-.}/spark/jobs:/opt/spark-jobs
      - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/data
      - ${AIRFLOW_PROJ_DIR:-.}/spark/jars:/opt/spark-jars
      - ${AIRFLOW_PROJ_DIR:-.}/src/hotel_data:/opt/airflow/hotel_data
      # Named volume keeps the SBERT model cached across container restarts.
      # Using a named volume (not a host bind-mount) avoids macOS→Lima→Docker
      # 9p filesystem permission mapping issues with UID 999.
      - hf-model-cache:/tmp/hf_cache
    networks:
      - delta-lake-network

  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - delta-lake-network

  # MinIO Client for bucket initialization
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY} ${AWS_SECRET_KEY}) do echo 'Waiting for MinIO...' && sleep 1; done; /usr/bin/mc mb myminio/data-lake --ignore-existing; /usr/bin/mc mb myminio/delta-lake --ignore-existing; /usr/bin/mc mb myminio/test-data-lake --ignore-existing; /usr/bin/mc mb myminio/test-delta-lake --ignore-existing; /usr/bin/mc anonymous set download myminio/data-lake; /usr/bin/mc anonymous set download myminio/delta-lake; /usr/bin/mc anonymous set download myminio/test-data-lake; /usr/bin/mc anonymous set download myminio/test-delta-lake; exit 0; "
    networks:
      - delta-lake-network

  jupyter-spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: hotel-mapping-jupyter
    ports:
      - "8888:8888"
    environment:
      - PYSPARK_PYTHON=/usr/local/bin/python3
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python3
      - PYTHONPATH=/opt/airflow
      - JUPYTER_RUNTIME_DIR=/tmp/jupyter/runtime
      - JUPYTER_DATA_DIR=/tmp/jupyter/data
      - JUPYTER_CONFIG_DIR=/tmp/jupyter/config
    volumes:
      # Save notebooks to your local machine so you don't lose them
      - ${AIRFLOW_PROJ_DIR:-.}/spark/jobs:/opt/spark-jobs
      - ${AIRFLOW_PROJ_DIR:-.}/src/hotel_data:/opt/airflow/hotel_data
    networks:
      - delta-lake-network
    # Starts Jupyter Lab without a password for easy local access
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --notebook-dir=/opt/spark-jobs

volumes:
  postgres-db-volume:
  minio-data:
  spark-tmp:
  spark-work:
  spark-binaries:
  hf-model-cache:


networks:
  delta-lake-network:
    driver: bridge
